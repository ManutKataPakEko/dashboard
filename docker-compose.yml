version: '3.8'

services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: attack-detection-dashboard
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # Pass your backend API URL here - change before deploy!
      - API_URL=${API_URL:-http://localhost:8000}
    restart: unless-stopped
    networks:
      - ojs-attack-detection-based-on-log_ojs-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  ojs-attack-detection-based-on-log_ojs-network:
    external: true
